<!DOCTYPE html>
<html lang="es">

<!-- Header-->
{{> header}}

<body class="d-flex flex-column h-100">
  <main class="flex-shrink-0">

    <!-- Navigation-->
    {{> nav_bar}}

    <header class="bg-dark py-5">
      <div class="container px-5">
        <div class="row gx-5 align-items-center">
          <div class="col-lg-8">
            <h1 class="display-6 fw-bolder text-white">Gestión de reseñas</h1>
            <p class="text-white-50">Formulario general. Si accedes desde un resultado de búsqueda, el campo "Nombre del
              lugar" se autocompletaría.</p>
          </div>
        </div>
      </div>
    </header>

    <section class="py-5">
      <div class="container px-5">
        <div class="row gx-5 justify-content-center">
          <div class="col-lg-8">
            <div class="card shadow-sm mb-4">
              <div class="card-body">
                <h5 class="card-title">Tu reseña</h5>
                <form id="add-review-form" action="{{formAction}}" method="post" enctype="multipart/form-data">
                  <input type="hidden" id="place-id" name="place-id" value="{{placeId}}" />
                  <input type="hidden" id="place-lat" name="place-lat" value="{{placeLat}}" />
                  <input type="hidden" id="place-lon" name="place-lon" value="{{placeLon}}" />

                  <div class="mb-3">
                    <label class="form-label">Nombre del lugar</label>
                    <input id="place-name" name="place-name" type="text" class="form-control"
                      placeholder="Ej. La Casa del Sabor" value="{{placeName}}" />

                  </div>
                  <div class="mb-3">
                    <label class="form-label">Tipo</label>
                    <input id="place-type" name="place-type" type="text" class="form-control"
                      placeholder="Ej. Restaurante" value="{{placeType}}" />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Puntuación</label>
                    <div class="star-rating" role="radiogroup" aria-label="Puntuación">
                      <input type="radio" name="rating" id="r5" value="5" autocomplete="off" checked>
                      <label for="r5" data-value="5" aria-label="5 estrellas"><i class="bi bi-star-fill"></i></label>
                      <input type="radio" name="rating" id="r4" value="4" autocomplete="off">
                      <label for="r4" data-value="4" aria-label="4 estrellas"><i class="bi bi-star-fill"></i></label>
                      <input type="radio" name="rating" id="r3" value="3" autocomplete="off">
                      <label for="r3" data-value="3" aria-label="3 estrellas"><i class="bi bi-star-fill"></i></label>
                      <input type="radio" name="rating" id="r2" value="2" autocomplete="off">
                      <label for="r2" data-value="2" aria-label="2 estrellas"><i class="bi bi-star-fill"></i></label>
                      <input type="radio" name="rating" id="r1" value="1" autocomplete="off">
                      <label for="r1" data-value="1" aria-label="1 estrella"><i class="bi bi-star-fill"></i></label>
                    </div>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Tu reseña</label>
                    <textarea id="review-text" name="review-text" class="form-control" rows="5"
                      placeholder="Cuenta tu experiencia..."></textarea>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Foto (opcional)</label>
                    <input id="photo" name="photo" class="form-control" type="file" accept="image/*" />
                  </div>
                  <button type="submit" class="btn btn-primary">Publicar reseña</button>
                  <a class="btn btn-outline-secondary ms-2" href="/reviews">Cancelar</a>
                </form>
              </div>
            </div>


          </div>


        </div>
      </div>
    </section>
  </main>

  <!-- Footer-->
  {{> footer}}



  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
