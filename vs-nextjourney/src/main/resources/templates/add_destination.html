<!DOCTYPE html>
<html lang="en">

{{> header}}

<body class="d-flex flex-column h-100">
    <main class="flex-shrink-0">

        {{> nav_bar}}

        <section class="py-5">
            <div class="container px-5">
                <div class="text-center mb-5">
                    <h1 class="fw-bolder">Añadir nuevo destino</h1>
                    <p class="lead fw-normal text-muted mb-0">
                        Introduce un destino que aún no exista en la plataforma.
                    </p>
                </div>

                <div class="row justify-content-center">
                    <div class="col-lg-8">

                        {{#imageError}}
                        <div class="alert alert-danger d-flex align-items-center mb-4" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <div>
                                La imagen del destino es obligatoria.
                            </div>
                        </div>
                        {{/imageError}}

                        <form action="/add_destination" method="post" enctype="multipart/form-data">
                            
                            <div class="form-floating mb-3">
                                <input type="text" name="name" class="form-control" id="destinationName" placeholder="Nombre del destino" required value="{{#destination}}{{name}}{{/destination}}">
                                <label for="destinationName">Nombre del destino</label>
                            </div>

                            <div class="form-floating mb-3">
                                <input type="text" name="country" class="form-control" id="destinationCountry" placeholder="País" required value="{{#destination}}{{country}}{{/destination}}">
                                <label for="destinationCountry">País</label>
                            </div>

                            <div class="form-floating mb-3">
                                <textarea name="description" class="form-control" id="destinationDescription" placeholder="Descripción"
                                    style="height: 150px" required>{{#destination}}{{description}}{{/destination}}</textarea>
                                <label for="destinationDescription">Descripción</label>
                            </div>

                            <div class="text mb-4">
                                <img id="previewImage" src="https://dummyimage.com/300x200/6c757d/ffffff&text=Vista+previa"
                                    alt="Preview Image" class="img-fluid rounded mb-2" style="max-height: 200px;">

                                <div>
                                    <label for="destinationImage" class="btn btn-outline-secondary">
                                        Seleccione imagen del destino
                                    </label>
                                    <input type="file" id="destinationImage" name="imageFile" accept="image/jpeg, image/png" hidden onchange="previewSelectedImage(event)">
                                </div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                                <a href="/destinations" class="btn btn-outline-secondary btn-lg">Cancelar</a>
                                <button type="submit" class="btn btn-primary btn-lg">Guardar destino</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    {{> footer}}

    <script>
        function previewSelectedImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById('previewImage');
                output.src = reader.result;
            };
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
