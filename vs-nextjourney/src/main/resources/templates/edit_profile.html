<!--NEREA-->
<!DOCTYPE html>
<html lang="es">

<!-- Header-->
{{> header}}

<body class="d-flex flex-column h-100">
    <main class="flex-shrink-0">

        <!-- Navigation-->
        {{> nav_bar}}

        <!-- User Profile Section -->
        <section class="py-5">
            <div class="container px-5">
                <div class="text-center mb-5">
                    <h1 class="fw-bolder">Perfil de Usuario</h1>
                    <p class="lead fw-normal text-muted mb-0">
                        Edita tu información personal.
                    </p>
                </div>
                <form class="row g-3 needs-validation" action="/edit_profile" method="post"
                    enctype="multipart/form-data" novalidate>
                    {{#error}}
                    <div class="alert alert-danger text-center">
                        {{error}}
                    </div>
                    {{/error}}

                    <div class="row justify-content-center">
                        <div class="col-lg-8">
                            <div class="text-center mb-4">

                                <!-- User Avatar -->
                                <img id="previewImage"
                                    src="{{#user.image}}/images/{{user.image.id}}{{/user.image}}{{^user.image}}https://dummyimage.com/150x150/6c757d/ffffff&text=Avatar{{/user.image}}"
                                    class="rounded-circle mb-3" alt="Avatar" width="150" height="150" />

                                <!-- Input para cambiar foto -->
                                <div>
                                    <label for="profileImage" class="btn btn-outline-secondary">
                                        Cambiar foto de perfil
                                    </label>
                                    <input type="file" id="profileImage" name="imageFile" accept="image/jpeg, image/png"
                                        hidden />
                                </div>

                                <small class="text-muted d-block mt-2">
                                    Formatos permitidos: JPG, PNG
                                </small>
                            </div>



                            <!-- Full Name -->
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="fullName" placeholder="Nombre completo"
                                    value="{{user.name}}" name="name">
                                <label for="fullName">Nombre completo</label>
                            </div>

                            <!-- Email -->
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="inputEmail4"
                                    placeholder="Introduce tu correo" value="{{user.email}}" name="email" required>
                                <div class="invalid-feedback">
                                    Introduce una dirección de correo válida
                                </div>
                                <label for="inputEmail4" class="form-label">Correo electrónico</label>
                            </div>



                            <!-- Username -->
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="inputAddress" minlength="4" maxlength="15"
                                    placeholder="Crea tu nombre de usuario" value="{{user.username}}" name="username"
                                    required>
                                <div class="invalid-feedback">
                                    Debes introducir un nombre de usuario válido (entre 4 y 15 caracteres)
                                </div>
                                <label for="username">Usuario</label>
                            </div>

                            <!-- Change Password -->
                            <div class="text-center mb-3">
                                <button type="button" class="btn btn-warning" onclick="togglePasswordChange()">
                                    Cambiar contraseña
                                </button>
                            </div>
                            <div id="passwordSection" style="display:none;">

                                <!-- Contraseña actual -->
                                <div class="form-floating mb-3">
                                    <input type="password" class="form-control" name="currentPassword"
                                        placeholder="Contraseña actual" required>
                                    <label>Contraseña actual</label>
                                </div>

                                <!-- Nueva contraseña -->
                                <div class="form-floating mb-3">
                                    <input type="password" class="form-control" name="newPassword" minlength="8"
                                        pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&]).+$" required>
                                    <label>Nueva contraseña</label>
                                </div>

                                <!-- Confirmación -->
                                <div class="form-floating mb-3">
                                    <input type="password" class="form-control" name="confirmPassword" required>
                                    <label>Confirmar nueva contraseña</label>
                                </div>

                            </div>

                            <!-- Buttons -->
                            <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                                <a href="/user_profile" class="btn btn-outline-secondary btn-lg">
                                    Cancelar
                                </a>
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Guardar cambios
                                </button>
                            </div>

                        </div>
                    </div>
                </form>
            </div>
        </section>

    </main>

    <!-- Footer-->
    {{> footer}}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>
    <script src="js/profile-preview.js"></script>
    <script>
        function togglePasswordChange() {
            const section = document.getElementById("passwordSection");
            section.style.display = section.style.display === "none" ? "block" : "none";
        }

        document.addEventListener("DOMContentLoaded", function () {
            const form = document.querySelector("form");
            const newPassword = document.getElementById("newPassword");
            const confirmPassword = document.getElementById("confirmPassword");

            form.addEventListener("submit", function (event) {
                if (newPassword.value !== confirmPassword.value) {
                    event.preventDefault();
                    alert("Las nuevas contraseñas no coinciden");
                }
            });
        });
    </script>
</body>

</html>
