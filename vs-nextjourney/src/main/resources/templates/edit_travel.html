<!DOCTYPE html>
<html lang="en">

<!-- Header-->
{{> header}}

<body class="d-flex flex-column h-100">
    <main class="flex-shrink-0">

        <!-- Navigation bar -->
        {{> nav_bar}}

        <!-- Page Content-->
        <section class="py-5">
            <div class="container px-5 my-5">
                <div class="row gx-5 justify-content-center">
                    <div class="col-lg-6">
                        <div class="text-center mb-5">
                            <h1 class="fw-bolder">Edita tu viaje</h1>
                            <p class="lead fw-normal text-muted mb-0">Para editar tu viaje modifica los datos que
                                quieras cambiar.</p>
                        </div>
                    </div>
                </div>

                {{#travel}}

                <!-- Form for creating a net trip-->
                <form action="/travel/{{id}}/edit" method="post" enctype="multipart/form-data">

                    <!-- CSRF token-->
                    <input type="hidden" name="_csrf" value="{{token}}"/>
                    
                    <!-- Title-->
                    <div class="mb-3">
                        <label class="form-label">Título del viaje</label>
                        <input type="text" class="form-control" name="title" value="{{title}}" required>
                    </div>

                    <!-- Images-->
                    <div class="mb-3">
                        <input type="file" class="form-control" name="coverImageFile">
                    </div>

                    <!-- Dates -->
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Fecha de inicio</label>
                            <input type="date" class="form-control" name="startDate" value="{{startDate}}">
                        </div>
                        <div class="col">
                            <label class="form-label">Fecha de fin</label>
                            <input type="date" class="form-control" name="endDate" value="{{endDate}}">
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="mb-3">
                        <label class="form-label">Descripción del viaje</label>
                        <textarea class="form-control" name="description" rows="4">{{description}}</textarea>
                    </div>

                    <!-- Countries -->
                    <div class="mb-3">
                        <label class="form-label">País(es) visitado(s)</label>
                        <input type="text" class="form-control" name="countries" value="{{countries}}">
                        <div class="form-text">Separados por comas</div>
                    </div>

                    <!-- Cities -->
                    <div class="mb-3">
                        <label class="form-label">Ciudad(es) visitada(s)</label>
                        <input type="text" class="form-control" name="cities" value="{{cities}}">
                        <div class="form-text">Separados por comas</div>
                    </div>

                    <!-- Places -->
                    <div class="mb-3">
                        <label class="form-label">Lugares visitados</label>
                        <input type="text" class="form-control" name="places" value="{{places}}">
                        <div class="form-text">Separados por comas</div>
                    </div>

                    <!-- Rating -->
                    <div class="mb-3">
                        <label class="form-label">Calificación</label>
                        <select class="form-select" name="rating">
                            <option value="1" {{#rating1}}selected{{/rating1}}>1 ⭐</option>
                            <option value="2" {{#rating2}}selected{{/rating2}}>2 ⭐</option>
                            <option value="3" {{#rating3}}selected{{/rating3}}>3 ⭐</option>
                            <option value="4" {{#rating4}}selected{{/rating4}}>4 ⭐</option>
                            <option value="5" {{#rating5}}selected{{/rating5}}>5 ⭐</option>
                        </select>
                    </div>

                    <!-- Comment -->
                    <div class="mb-3">
                        <label class="form-label">Comentario sobre el viaje</label>
                        <textarea class="form-control" name="comment" rows="4">{{comment}}</textarea>
                    </div>

                    <!-- Images -->
                    <div class="mb-3">
                        <label class="form-label">Imágenes del viaje</label>
                        <input type="file" class="form-control" name="carouselImageFiles" multiple>
                        <div class="form-text">Puedes subir varias imágenes</div>
                    </div>

                    <!-- PDF -->
                    <div class="mb-3">
                        <label class="form-label">PDF con itinerario</label>
                        <input type="file" class="form-control" name="itineraryFile">
                        <div class="form-text">Formato permitido: pdf</div>
                    </div>

                    <!-- Members -->
                    <div class="mb-3">
                        <label class="form-label">Miembros del viaje</label>
                        <input type="text" class="form-control" name="emailsColaborators" value="{{members}}">
                        <div class="form-text">Correos separados por comas</div>
                    </div>

                    <!-- Buttons -->
                    <div class="d-flex justify-content-center gap-3 mt-4">
                        <button type="submit" class="btn btn-primary px-5"> Aplicar cambios </button>
                        <a href="/travel/{{id}}" class="btn btn-outline-secondary px-5"> Cancelar </a>
                    </div>
                </form>
                {{/travel}}
            </div>
        </section>
    </main>

    <!-- Footer-->
    {{> footer}}

    <!-- Bootstrap core JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core theme JS-->
    <script src="js/scripts.js"></script>
</body>

</html>
