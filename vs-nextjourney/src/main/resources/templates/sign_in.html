<!--NEREA-->

<!DOCTYPE html>
<html lang="en">

<!-- Header-->
{{> header}}

<body class="d-flex flex-column h-100">
    <main class="flex-shrink-0">

        <!-- Navigation-->
        {{> nav_bar}}

        <!-- Page Content-->
        <section class="py-5">
            <div class="container px-5 my-5">
                <div class="row gx-5 justify-content-center">
                    <div class="col-lg-6">
                        <div class="text-center mb-5">
                            <h1 class="fw-bolder">Inicia sesión</h1>
                            <p class="lead fw-normal text-muted mb-0">Necesitas iniciar sesión para acceder a tu cuenta
                                y planificar tus
                                viajes</p>
                        </div>
                    </div>
                    <form class="row g-3 justify-content-center">


                        <div class="col-md-6">
                            <label for="floatingInput">Nombre de usuario</label>
                            <input type="text" class="form-control" id="floatingInput"
                                placeholder="Introduce tu nombre de usuario" required>

                        </div>
                        <div class="w-100"></div>
                        <div class="col-md-6">
                            <label for="floatingPassword">Contraseña</label>
                            <input type="password" class="form-control" id="floatingPassword"
                                placeholder="Introduce tu contraseña" required>

                        </div>
                        <div class="w-100"></div>
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">
                                Iniciar sesión
                            </button>
                            <div class="w-100"></div>
                            <a class="nav-link" href="/register">¿No tienes cuenta? Regístrate</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>



    </main>

    <!-- Footer-->
    {{> footer}}


    <!-- Bootstrap core JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core theme JS-->
    <script src="js/scripts.js"></script>
</body>

</html>
