<!DOCTYPE html>
<html lang="en">

{{> header}}

<body class="d-flex flex-column h-100">
    <main class="flex-shrink-0">

        {{> nav_bar}}

        <section class="py-5">
            <div class="container px-5">
                <div class="text-center mb-5">
                    <h1 class="fw-bolder">Añadir lugar que visitar</h1>
                    <p class="lead fw-normal text-muted mb-0">
                        Añade un nuevo punto de interés para <strong>{{destination.name}}</strong>.
                    </p>
                </div>

                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <form action="/destinations/{{destination.id}}/add_place" method="post">
                            
                            <div class="form-floating mb-3">
                                <input type="text" name="name" class="form-control" id="placeName" placeholder="Nombre del lugar" required>
                                <label for="placeName">Nombre del lugar</label>
                            </div>

                            <div class="form-floating mb-3">
                                <textarea name="description" class="form-control" id="placeDescription" placeholder="Descripción"
                                    style="height: 150px" required></textarea>
                                <label for="placeDescription">Descripción</label>
                            </div>

                            <div class="form-floating mb-4">
                                <select name="category" class="form-select" id="placeCategory" required>
                                    <option value="" selected disabled>Selecciona una categoría</option>
                                    <option value="Historia">Historia</option>
                                    <option value="Museo">Museo</option>
                                    <option value="Parque">Parque</option>
                                    <option value="Mirador">Mirador</option>
                                    <option value="Plaza">Plaza</option>
                                    <option value="Otro">Otro</option>
                                </select>
                                <label for="placeCategory">Categoría</label>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                                <a href="/destinations/{{destination.id}}" class="btn btn-outline-secondary btn-lg">
                                    Cancelar
                                </a>
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Guardar lugar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>

    </main>

    {{> footer}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
