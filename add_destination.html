<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Next Journey — Añadir destino</title>

    <!-- Bootstrap icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Core theme CSS -->
    <link href="css/styles.css" rel="stylesheet" />
</head>

<body class="d-flex flex-column h-100">
<main class="flex-shrink-0">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container px-5">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-airplane me-2"></i>
                Next Journey
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link active" href="destinations.html">Destinos</a></li>
                    <li class="nav-item"><a class="nav-link" href="mytravels.html">Mis viajes</a></li>
                    <li class="nav-item"><a class="nav-link" href="reviews.html">Reseñas</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Add Destination Section -->
    <section class="py-5">
        <div class="container px-5">
            <div class="text-center mb-5">
                <h1 class="fw-bolder">Añadir nuevo destino</h1>
                <p class="lead fw-normal text-muted mb-0">
                    Introduce un destino que aún no exista en la plataforma.
                </p>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <form>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="destinationName"
                                   placeholder="Nombre del destino" required>
                            <label for="destinationName">Nombre del destino</label>
                        </div>

                        <div class="form-floating mb-3">
                            <textarea class="form-control" id="destinationDescription"
                                      placeholder="Descripción"
                                      style="height: 150px" required></textarea>
                            <label for="destinationDescription">Descripción</label>
                        </div>

                        <div class="text-center mb-4">
                            <img id="previewImage" src="https://dummyimage.com/300x200/6c757d/ffffff&text=Destination+Image"
                                alt="Preview Image" class="img-fluid rounded mb-2" style="max-height: 200px;">

                            <div>
                                <label for="destinationImage" class="btn btn-outline-secondary">
                                Select destination image
                                </label>
                                <input type="file" id="destinationImage" name="destinationImage" accept="image/jpeg, image/png" hidden
                                    onchange="previewSelectedImage(event)">
                            </div>

                            <small class="text-muted d-block mt-2">
                                Allowed formats: JPG, PNG
                            </small>
                            </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                            <a href="destinations.html" class="btn btn-outline-secondary btn-lg">
                                Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary btn-lg">
                                Guardar destino
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

</main>

<!-- Footer -->
<footer class="bg-dark py-4 mt-auto">
    <div class="container px-5">
        <div class="row align-items-center justify-content-between flex-column flex-sm-row">
            <div class="col-auto">
                <div class="small m-0 text-white">&copy; Next Journey 2026</div>
            </div>
            <div class="col-auto">
                <a class="link-light small" href="#!">Privacidad</a>
                <span class="text-white mx-1">&middot;</span>
                <a class="link-light small" href="#!">Términos</a>
                <span class="text-white mx-1">&middot;</span>
                <a class="link-light small" href="contact.html">Contacto</a>
            </div>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
