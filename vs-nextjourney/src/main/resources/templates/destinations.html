<!DOCTYPE html>
<html lang="en">

{{> header}}

<body class="d-flex flex-column">
    <main class="flex-shrink-0">

        {{> nav_bar}}

        <header class="bg-dark py-5">
            <div class="container px-5">
                
                <div class="d-flex justify-content-end gap-2">
                    <a href="/add_destination" class="text-white fs-4" title="Añadir nuevo destino">
                        <i class="bi bi-plus-square"></i>
                    </a>
                </div>
                

                <div class="text-center mt-3">
                    <h1 class="display-5 fw-bolder text-white mb-4">Destinos</h1>
                </div>
            </div>
        </header>

        <section class="py-5">
            <div class="container px-5">
                <div class="row gx-5">
                    
                    {{#destinations}}
                    <div class="col-lg-4 mb-5">
                        <div class="card h-100 shadow border-0">
                            <img class="card-img-top" src="/images/{{coverImage.id}}" alt="{{name}}" style="height: 200px; object-fit: cover;" />
                            
                            <div class="card-body p-4 d-flex flex-column">
                                <h5 class="card-title mb-3">
                                    <a class="text-decoration-none link-dark" href="/destinations/{{id}}">
                                        {{name}}, {{country}}
                                    </a>
                                </h5>
                                <p class="card-text mb-4 text-muted small">{{description}}</p>
                                
                                <a class="btn btn-outline-primary mt-auto align-self-start" href="/destinations/{{id}}">
                                    Más información
                                </a>
                            </div>
                        </div>
                    </div>
                    {{/destinations}}

                    {{^destinations}}
                    <div class="col-12 text-center py-5">
                        <p class="text-muted">No hay destinos disponibles en este momento.</p>
                    </div>
                    {{/destinations}}

                </div>
            </div>
        </section>
    </main>

    {{> footer}}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
