<!DOCTYPE html>
<html lang="en">

{{> header}}

<body class="d-flex flex-column h-100">
    <main class="flex-shrink-0">

        {{> nav_bar}}

        <section class="py-5">
            <div class="container px-5 my-5">
                <div class="row gx-5 justify-content-center">
                    <div class="col-lg-6">
                        <div class="text-center mb-5">
                            <h1 class="fw-bolder">Inicia sesión</h1>
                            <p class="lead fw-normal text-muted mb-0">Algo no ha ido bien. Por favor, inténtalo de
                                nuevo.</p>
                        </div>

                        <div class="alert alert-danger d-flex align-items-center mb-4" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <div>
                                Usuario o contraseña incorrectos.
                            </div>
                        </div>

                        <form class="row g-3 justify-content-center" action="/login" method="post">
                            <!-- CSRF token-->
                            <input type="hidden" name="_csrf" value="{{token}}" />

                            <div class="col-md-12">
                                <label for="floatingInput">Nombre de usuario</label>
                                <input type="text" name="username" class="form-control" id="floatingInput"
                                    placeholder="Introduce tu nombre de usuario" required>
                            </div>

                            <div class="col-md-12">
                                <label for="floatingPassword">Contraseña</label>
                                <input type="password" name="password" class="form-control" id="floatingPassword"
                                    placeholder="Introduce tu contraseña" required>
                            </div>

                            <div class="text-center mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Reintentar sesión
                                </button>
                                <div class="mt-3">
                                    <a class="nav-link text-primary" href="/register">¿No tienes cuenta? Regístrate</a>
                                    <a class="nav-link text-muted small" href="/index">Volver al inicio</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    {{> footer}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
