    <!-- Custom styles -->
    <link href="css/styles.css" rel="stylesheet" />

<body class="d-flex flex-column h-100">
<main class="flex-shrink-0">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container px-5">
            <a class="navbar-brand d-flex align-items-center" href="index.html">

                Next Journey
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent"
                    aria-controls="navbarSupportedContent"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#destinos-recomendados">Destinations</a></li>
                    <li class="nav-item"><a class="nav-link" href="mytravels.html">My Travels</a></li>
                    <li class="nav-item"><a class="nav-link" href="reviews.html">Reviews</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>

                    <!-- Admin button -->
                    <li class="nav-item">
                        <a class="nav-link" href="admin_users.html">Admin</a>
                    </li>

                    <!-- Profile dropdown -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" id="navbarDropdownProfile"
                           href="#" role="button" data-bs-toggle="dropdown"
                           aria-expanded="false">
                            My Profile
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end"
                            aria-labelledby="navbarDropdownProfile">
                            <li><a class="dropdown-item active" href="user_profile.html">View Profile</a></li>
                            <li><a class="dropdown-item" href="sign_in.html">Sign in</a></li>
                            <li><a class="dropdown-item" href="register.html">Register</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- User Profile Section -->
    <section class="py-5">
        <div class="container px-5">
            <div class="text-center mb-5">
                <h1 class="fw-bolder">My Profile</h1>
                <p class="lead fw-normal text-muted mb-0">
                    Update your personal information below.
                </p>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <!-- Profile Form -->
                    <form>
                        <!-- Full Name -->
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="fullName" placeholder="Full Name" required>
                            <label for="fullName">Full Name</label>
                        </div>

                        <!-- Email -->
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="email" placeholder="Email" required>
                            <label for="email">Email</label>
                        </div>

                        <!-- Username -->
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" placeholder="Username" required>
                            <label for="username">Username</label>
                        </div>

                        <!-- Password -->
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password" placeholder="Password">
                            <label for="password">Password</label>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid mb-3">
                            <button class="btn btn-primary btn-lg" type="submit">Save Changes</button>
                        </div>

                        <!-- Delete Account -->
                        <div class="d-grid">
                            <button class="btn btn-danger btn-lg" type="button">Delete Account</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

</main>

                <a class="link-light small" href="contact.html">Contact</a>
            </div>
        </div>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
