<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Next Journey — Añadir lugar</title>

    <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <!-- Bootstrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Core theme CSS -->
    <link href="styles.css" rel="stylesheet" />
</head>

<body class="d-flex flex-column h-100">
    <main class="flex-shrink-0">

        <!-- Navigation-->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container px-5">
                <a class="navbar-brand d-flex align-items-center" href="/">
                    <i class="bi bi-airplane me-2"></i>
                    Next Journey
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link active" href="/destinations">Destinos</a></li>
                        <li class="nav-item"><a class="nav-link" href="/mytravels">Mis viajes</a></li>
                        <li class="nav-item"><a class="nav-link" href="/reviews">Reseñas</a></li>
                        <li class="nav-item"><a class="nav-link" href="/faq">FAQ</a></li>
                        <li class="nav-item"><a class="nav-link" href="/contact">Contacto</a></li>

                        <!-- Admin -->
                        <li class="nav-item">
                            <a class="nav-link" href="/admin_users">Admin</a>
                        </li>

                        <!--Perfil-->
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" id="navbarDropdownProfile" href="#" role="button"
                                data-bs-toggle="dropdown" aria-expanded="false"> Mi perfil</a>
                            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdownProfile">
                                <li>
                                    <a class="dropdown-item" href="/user_profile">Ver mi perfil</a>
                                </li>
                                <li>
                                    <a class="dropdown-item" href="/sign_in">Iniciar sesión</a>
                                </li>
                                <li>
                                    <a class="dropdown-item" href="/register">Registrarse</a>
                                </li>
                            </ul>
                        </li>

                    </ul>
                </div>
            </div>
        </nav>

        <!-- Add Place Section -->
        <section class="py-5">
            <div class="container px-5">
                <div class="text-center mb-5">
                    <h1 class="fw-bolder">Añadir lugar que visitar</h1>
                    <p class="lead fw-normal text-muted mb-0">
                        Añade un nuevo punto de interés dentro de este destino.
                    </p>
                </div>

                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <form>
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="placeName" placeholder="Nombre del lugar"
                                    required>
                                <label for="placeName">Nombre del lugar</label>
                            </div>

                            <div class="form-floating mb-3">
                                <textarea class="form-control" id="placeDescription" placeholder="Descripción"
                                    style="height: 150px" required></textarea>
                                <label for="placeDescription">Descripción</label>
                            </div>

                            <div class="form-floating mb-4">
                                <select class="form-select" id="placeCategory" required>
                                    <option value="" selected disabled>Selecciona una categoría</option>
                                    <option>Historia</option>
                                    <option>Museo</option>
                                    <option>Parque</option>
                                    <option>Mirador</option>
                                    <option>Plaza</option>
                                    <option>Otro</option>
                                </select>
                                <label for="placeCategory">Categoría</label>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                                <a href="/one_destination" class="btn btn-outline-secondary btn-lg">
                                    Cancelar
                                </a>
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Guardar lugar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>

    </main>

{{> footer}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
