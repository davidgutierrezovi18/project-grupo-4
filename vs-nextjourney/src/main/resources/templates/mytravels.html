<!DOCTYPE html>
<html lang="en">

<!-- Header-->
{{> header}}

<body class="d-flex flex-column">
    <main class="flex-shrink-0">


        <!-- Navigation bar-->
        {{> nav_bar}}


        <!-- Header-->
        <header class="bg-dark py-5">
            <div class="container px-5">

                <!-- Pencil at the right of the header -->
                <div class="d-flex justify-content-end gap-2">
                    <a href="/travel/new" class="text-white fs-4" title="Editar viaje">
                        <i class="bi bi-plus-square"></i>
                    </a>
                </div>

                <!-- Centered content -->
                <div class="text-center mt-3">
                    <h1 class="display-5 fw-bolder text-white mb-4">Mis viajes</h1>
                </div>

            </div>
        </header>

        <!-- My travels section-->
        <section class="py-5">
            <div class="container px-5">

                <!-- If there are travels created-->
                <div class="row gx-5">

                    {{#travels}}
                    <div class="col-lg-4 mb-5">
                        <div class="card h-100 shadow border-0">

                            {{#coverImage}}
                            <img class="card-img-top" src="/images/{{coverImage.id}}" alt="cover" style="width: 100%; height: 250px; object-fit: cover;" />
                            <!--<img class="card-img-top" src="/images/{{coverImage.id}}" alt="cover" />-->
                            {{/coverImage}}

                            <div class="card-body p-4 d-flex flex-column">

                                <h5 class="card-title mb-3">
                                    <a class="text-decoration-none link-dark" href="/travel/{{id}}">
                                        {{title}}
                                    </a>
                                </h5>

                                <p class="card-text">
                                    {{description}}
                                </p>

                                <a class="btn btn-outline-primary align-self-start" href="/travel/{{id}}">
                                    Ver detalles
                                </a>

                            </div>
                        </div>
                    </div>
                    {{/travels}}

                    <!-- If there are not travels created-->
                    {{^travels}}
                    <div class="col-12 text-center">
                        <p class="lead text-muted">No tienes viajes registrados aún. </p>
                    </div>
                    {{/travels}}

                </div>


            </div>
        </section>
    </main>

    <!-- Footer-->
    {{> footer}}


    <!-- Bootstrap core JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core theme JS-->
    <script src="js/scripts.js"></script>
</body>

</html>
